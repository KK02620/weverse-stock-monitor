name: Build Mac App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Mac App
      run: python build_mac.py

    - name: Create DMG
      run: |
        # 创建临时目录
        mkdir -p dmg_temp
        cp -R dist/WeverseStockMonitor.app dmg_temp/

        # 创建 DMG
        hdiutil create -volname "WeverseStockMonitor" \
          -srcfolder dmg_temp \
          -ov -format UDZO \
          dist/WeverseStockMonitor-macOS.dmg

        ls -la dist/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WeverseStockMonitor-macOS
        path: dist/WeverseStockMonitor-macOS.dmg

    - name: Get version
      id: version
      run: echo "version=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: WeverseStockMonitor ${{ steps.version.outputs.version }}
        body: |
          ## Weverse Stock Monitor for macOS

          ### 下载说明
          1. 下载 `WeverseStockMonitor-macOS.dmg`
          2. 双击打开 DMG 文件
          3. 将 `WeverseStockMonitor.app` 拖到"应用程序"文件夹，或直接双击运行
          4. 首次运行：右键点击 → 打开（或在系统设置中允许）

          ### 更新内容
          - 自动构建版本
          - 增加 MP3 声音提示与系统托盘选择功能
        files: dist/WeverseStockMonitor-macOS.dmg
        draft: false
        prerelease: false
