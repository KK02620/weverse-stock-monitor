name: Build Mac App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Mac App
      run: python build_mac.py

    - name: Package App as ZIP
      run: |
        cd dist
        zip -r -y WeverseStockMonitor-macOS.zip WeverseStockMonitor.app
        ls -la

    - name: Get version
      id: version
      run: echo "version=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: WeverseStockMonitor ${{ steps.version.outputs.version }}
        body: |
          ## Weverse Stock Monitor for macOS

          ### 下载说明
          1. 下载 `WeverseStockMonitor-macOS.zip`
          2. 解压得到 `WeverseStockMonitor.app`
          3. 首次运行：右键点击 → 打开（或在系统设置中允许）

          ### 更新内容
          - 自动构建版本
        files: dist/WeverseStockMonitor-macOS.zip
        draft: false
        prerelease: false
