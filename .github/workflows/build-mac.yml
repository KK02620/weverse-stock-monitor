name: Build Mac App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Mac App
      run: python build_mac.py

    - name: Package App as ZIP
      run: |
        cd dist
        zip -r -y WeverseStockMonitor-macOS.zip WeverseStockMonitor.app
        ls -la

    - name: Upload App ZIP
      uses: actions/upload-artifact@v4
      with:
        name: WeverseStockMonitor-macOS
        path: dist/WeverseStockMonitor-macOS.zip
        retention-days: 30
